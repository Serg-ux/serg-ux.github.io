<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <script>(function () { var t = localStorage.getItem('cybernook-theme'); if (t) document.documentElement.dataset.theme = t; })();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    /* ===================== Theme tokens ===================== */
    :root[data-theme="dark"] {
      --bg: #0f141b;
      --bg-soft: #161d27;
      --border: #243042;
      --text: #d8dee9;
      --muted: #8c97a8;
      --accent: #2dd4bf;
      --accent-soft: rgba(45, 212, 191, 0.12);
      --code-bg: #131a24;
      --shadow: rgba(0, 0, 0, 0.45);
      /* tag palette */
      --t-blue: #58a6ff;
      --t-red: #ff7b72;
      --t-very-easy: #2ee6a6;
      --t-easy: #9fef00;
      --t-medium: #ffaf00;
      --t-hard: #ff3e3e;
      --t-insane: #b85ef5;
      /* syntax */
      --syn-comment: #7d8799;
      --syn-keyword: #c678dd;
      --syn-string: #98c379;
      --syn-func: #61afef;
      --syn-type: #e5c07b;
      --syn-number: #d19a66;
      --syn-var: #e06c75;
      --syn-op: #56b6c2;
    }

    :root[data-theme="light"] {
      --bg: #f6f7f9;
      --bg-soft: #ffffff;
      --border: #dde3ea;
      --text: #21262e;
      --muted: #5d6877;
      --accent: #0d9488;
      --accent-soft: rgba(13, 148, 136, 0.10);
      --code-bg: #eef1f5;
      --shadow: rgba(20, 30, 40, 0.10);
      --t-blue: #0a69da;
      --t-red: #cf222e;
      --t-very-easy: #0f9d6e;
      --t-easy: #4f8a00;
      --t-medium: #b07503;
      --t-hard: #cf2222;
      --t-insane: #8a3fd1;
      --syn-comment: #a0a1a7;
      --syn-keyword: #a626a4;
      --syn-string: #50a14f;
      --syn-func: #4078f2;
      --syn-type: #c18401;
      --syn-number: #986801;
      --syn-var: #e45649;
      --syn-op: #0184bc;
    }

    /* ===================== Base ===================== */
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 19px;
      line-height: 1.65;
      transition: background 0.25s ease, color 0.25s ease;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: "Space Grotesk", system-ui, sans-serif;
      line-height: 1.25;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    code,
    pre,
    kbd {
      font-family: "JetBrains Mono", ui-monospace, monospace;
    }

    .layout {
      display: flex;
      max-width: 1100px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ===================== Sidebar ===================== */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      padding: 48px 32px;
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 14px;
      color: var(--text);
    }

    .brand:hover {
      text-decoration: none;
    }

    .avatar {
      width: 88px;
      height: 88px;
    }

    .site-name {
      margin: 0;
      font-size: 1.7rem;
      letter-spacing: -0.02em;
    }

    .site-name .tld {
      color: var(--accent);
    }

    .alias {
      margin: 2px 0 0;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .tagline {
      margin: 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .site-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 28px;
    }

    .site-nav a {
      color: var(--muted);
      font-family: "Space Grotesk", sans-serif;
      font-weight: 500;
      font-size: 1rem;
      padding: 7px 12px;
      border-radius: 8px;
      border-left: 2px solid transparent;
    }

    .site-nav a:hover {
      color: var(--text);
      background: var(--bg-soft);
      text-decoration: none;
    }

    .site-nav a.active {
      color: var(--accent);
      background: var(--accent-soft);
      border-left-color: var(--accent);
    }

    .socials {
      display: flex;
      gap: 14px;
      margin-top: 26px;
    }

    .socials a {
      color: var(--muted);
      display: inline-flex;
    }

    .socials a:hover {
      color: var(--accent);
    }

    .socials svg {
      width: 21px;
      height: 21px;
    }

    .theme-toggle {
      margin-top: auto;
      align-self: flex-start;
      background: var(--bg-soft);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 16px;
      font: 500 0.82rem "Space Grotesk", sans-serif;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .theme-toggle:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    /* ===================== Main column ===================== */
    .main {
      flex: 1;
      min-width: 0;
      padding: 48px 48px 80px;
      max-width: 780px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 1.9rem;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ===================== Listing / search / chips ===================== */
    .search-input {
      width: 100%;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font: 400 0.95rem "Inter", sans-serif;
      padding: 11px 16px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    /* container for filter chips — NOT prefixed "tag-" to avoid colliding
       with a generated tag class like .tag-cloud (tag named "cloud") */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 30px;
    }

    .tag,
    .chip {
      display: inline-flex;
      align-items: center;
      box-sizing: border-box;
      height: 24px;
      /* identical pill height everywhere */
      font-weight: 600;
      font-size: 12px;
      /* fixed px so it never scales with context */
      line-height: 1;
      font-family: "JetBrains Mono", monospace;
      letter-spacing: 0.02em;
      text-transform: capitalize;
      padding: 0 11px;
      border-radius: 999px;
      color: var(--muted);
      background: color-mix(in srgb, var(--muted) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--muted) 25%, transparent);
      white-space: nowrap;
    }

    .chip {
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
    }

    .chip.active {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
    }

    /* team + difficulty colors (shared by tags and chips) */
    .tag-blue-team {
      color: var(--t-blue);
      background: color-mix(in srgb, var(--t-blue) 13%, transparent);
      border-color: color-mix(in srgb, var(--t-blue) 35%, transparent);
    }

    .tag-red-team {
      color: var(--t-red);
      background: color-mix(in srgb, var(--t-red) 13%, transparent);
      border-color: color-mix(in srgb, var(--t-red) 35%, transparent);
    }

    .tag-very-easy {
      color: var(--t-very-easy);
      background: color-mix(in srgb, var(--t-very-easy) 13%, transparent);
      border-color: color-mix(in srgb, var(--t-very-easy) 35%, transparent);
    }

    .tag-easy {
      color: var(--t-easy);
      background: color-mix(in srgb, var(--t-easy) 13%, transparent);
      border-color: color-mix(in srgb, var(--t-easy) 35%, transparent);
    }

    .tag-medium {
      color: var(--t-medium);
      background: color-mix(in srgb, var(--t-medium) 13%, transparent);
      border-color: color-mix(in srgb, var(--t-medium) 35%, transparent);
    }

    .tag-hard {
      color: var(--t-hard);
      background: color-mix(in srgb, var(--t-hard) 13%, transparent);
      border-color: color-mix(in srgb, var(--t-hard) 35%, transparent);
    }

    .tag-insane {
      color: var(--t-insane);
      background: color-mix(in srgb, var(--t-insane) 13%, transparent);
      border-color: color-mix(in srgb, var(--t-insane) 35%, transparent);
    }

    .chip.active.tag-blue-team {
      background: var(--t-blue);
      color: var(--bg);
    }

    .chip.active.tag-red-team {
      background: var(--t-red);
      color: var(--bg);
    }

    .chip.active.tag-very-easy {
      background: var(--t-very-easy);
      color: #06231a;
    }

    .chip.active.tag-easy {
      background: var(--t-easy);
      color: #10210b;
    }

    .chip.active.tag-medium {
      background: var(--t-medium);
      color: #241a05;
    }

    .chip.active.tag-hard {
      background: var(--t-hard);
      color: #fff;
    }

    .chip.active.tag-insane {
      background: var(--t-insane);
      color: #fff;
    }

    /* abbreviation tags render fully uppercase — add new ones here */
    .tag-dfir,
    .tag-soc,
    .tag-ad {
      text-transform: uppercase;
    }

    .post-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .item {
      padding: 22px 0;
      border-bottom: 1px solid var(--border);
    }

    .item:first-child {
      padding-top: 4px;
    }

    .item-meta {
      color: var(--muted);
      font-size: 0.8rem;
      font-family: "JetBrains Mono", monospace;
    }

    .item h2 {
      margin: 6px 0 4px;
      font-size: 1.25rem;
    }

    .item h2 a {
      color: var(--text);
    }

    .item h2 a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .item .desc {
      margin: 4px 0 10px;
      color: var(--muted);
      font-size: 0.92rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-top: 34px;
      color: var(--muted);
      font: 500 0.88rem "Space Grotesk", sans-serif;
    }

    .pagination a {
      cursor: pointer;
    }

    .no-results {
      color: var(--muted);
      padding: 40px 0;
      text-align: center;
      font-style: italic;
    }

    /* ===================== Article ===================== */
    .article-header {
      margin-bottom: 34px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }

    .article-header h1 {
      margin: 8px 0 12px;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }

    .article-meta {
      color: var(--muted);
      font-size: 0.82rem;
      font-family: "JetBrains Mono", monospace;
    }

    .backlink {
      font: 500 0.88rem "Space Grotesk", sans-serif;
    }

    .article-footer {
      margin-top: 48px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .article-body {
      font-size: 1rem;
    }

    .article-body h2 {
      margin: 2.2em 0 0.6em;
      font-size: 1.45rem;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .article-body h3 {
      margin: 1.8em 0 0.5em;
      font-size: 1.15rem;
    }

    .article-body h2::before,
    .article-body h3::before {
      content: "# ";
      color: var(--accent);
      font-weight: 600;
    }

    .article-body img {
      display: block;
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    /* caption: italic line written right after an image */
    .article-body img+em {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .article-body blockquote {
      margin: 1.2em 0;
      padding: 10px 18px;
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 0 8px 8px 0;
      color: var(--muted);
    }

    .article-body blockquote p {
      margin: 0.3em 0;
    }

    .article-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.2em 0;
      font-size: 0.92rem;
      display: block;
      overflow-x: auto;
    }

    .article-body th,
    .article-body td {
      border: 1px solid var(--border);
      padding: 8px 14px;
      text-align: left;
    }

    .article-body th {
      background: var(--bg-soft);
      font-family: "Space Grotesk", sans-serif;
    }

    .article-body code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 6px;
      font-size: 0.86em;
    }

    .article-body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      overflow-x: auto;
      line-height: 1.55;
      font-size: 0.85rem;
    }

    .article-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
    }

    .article-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.4em 0;
    }

    /* rouge syntax tokens */
    .highlight .c,
    .highlight .cm,
    .highlight .c1,
    .highlight .cs,
    .highlight .ch {
      color: var(--syn-comment);
      font-style: italic;
    }

    .highlight .k,
    .highlight .kd,
    .highlight .kn,
    .highlight .kp,
    .highlight .kr,
    .highlight .kt,
    .highlight .kc,
    .highlight .nt {
      color: var(--syn-keyword);
    }

    .highlight .s,
    .highlight .s1,
    .highlight .s2,
    .highlight .sb,
    .highlight .sd,
    .highlight .se,
    .highlight .sh,
    .highlight .si,
    .highlight .sr,
    .highlight .sx,
    .highlight .ss {
      color: var(--syn-string);
    }

    .highlight .nf,
    .highlight .fm,
    .highlight .na,
    .highlight .nb {
      color: var(--syn-func);
    }

    .highlight .nc,
    .highlight .nn,
    .highlight .no {
      color: var(--syn-type);
    }

    .highlight .m,
    .highlight .mi,
    .highlight .mf,
    .highlight .mh,
    .highlight .mo,
    .highlight .il {
      color: var(--syn-number);
    }

    .highlight .nv,
    .highlight .vi,
    .highlight .vg,
    .highlight .vc {
      color: var(--syn-var);
    }

    .highlight .o,
    .highlight .ow,
    .highlight .p {
      color: var(--syn-op);
    }

    .highlight .gp {
      color: var(--syn-comment);
      user-select: none;
    }

    .highlight .err {
      color: inherit;
      background: none;
    }

    /* ===================== Under construction ===================== */
    .ascii-robot {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--accent);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 26px 30px;
      overflow-x: auto;
    }

    /* ===================== Mobile ===================== */
    @media (max-width: 860px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 22px 22px 18px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        grid-template-areas:
          "brand brand toggle"
          "nav nav nav"
          "social social social";
        align-items: center;
        gap: 12px;
      }

      .brand {
        grid-area: brand;
        flex-direction: row;
        align-items: center;
        gap: 14px;
      }

      .avatar {
        width: 48px;
        height: 48px;
      }

      .site-name {
        font-size: 1.3rem;
      }

      .alias,
      .tagline {
        display: none;
      }

      .site-nav {
        grid-area: nav;
        flex-direction: row;
        flex-wrap: wrap;
        margin-top: 0;
        gap: 4px;
      }

      .site-nav a {
        border-left: none;
        padding: 5px 11px;
        font-size: 0.92rem;
      }

      .site-nav a.active {
        border-left-color: transparent;
      }

      .socials {
        grid-area: social;
        margin-top: 0;
      }

      .theme-toggle {
        grid-area: toggle;
        margin-top: 0;
      }

      .main {
        padding: 28px 22px 60px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <a class="brand" href="{{ '/' | relative_url }}">
        <!-- Minimalist hooded-figure avatar, pure inline SVG -->
        <svg class="avatar" viewBox="0 0 96 96" aria-label="cybernook avatar" role="img">
          <rect width="96" height="96" rx="22" fill="var(--accent-soft)" />
          <rect x="0.5" y="0.5" width="95" height="95" rx="21.5" fill="none" stroke="var(--accent)"
            stroke-opacity="0.35" />
          <path d="M48 16c-16 0-25 12-25 27v21c0 2 1.5 4 4 4h42c2.5 0 4-2 4-4V43c0-15-9-27-25-27z" fill="none"
            stroke="var(--accent)" stroke-width="4" stroke-linejoin="round" />
          <path d="M37 44l7 6-7 6" fill="none" stroke="var(--text)" stroke-width="4" stroke-linecap="round"
            stroke-linejoin="round" />
          <line x1="50" y1="56" x2="60" y2="56" stroke="var(--text)" stroke-width="4" stroke-linecap="round" />
        </svg>
        <h1 class="site-name">cyber<span class="tld">nook</span></h1>
      </a>
      <p class="alias">{{ site.author.name }}</p>
      <p class="tagline">{{ site.author.tagline }}</p>

      <nav class="site-nav">
        {% assign p = page.url %}
        <a href="{{ '/' | relative_url }}" {% if p=='/' or p contains '/posts/' or p contains '/page' %}class="active"
          {% endif %}>Posts</a>
        <a href="{{ '/writeups/' | relative_url }}" {% if p contains '/writeups' %}class="active" {% endif
          %}>Writeups</a>
        <a href="{{ '/presentations/' | relative_url }}" {% if p contains '/presentations' %}class="active" {% endif
          %}>Presentations</a>
        <a href="{{ '/about/' | relative_url }}" {% if p contains '/about' %}class="active" {% endif %}>About</a>
      </nav>

      <div class="socials">
        <a href="{{ site.social.linkedin }}" aria-label="LinkedIn" title="LinkedIn">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z" />
          </svg>
        </a>
        <a href="{{ site.social.github }}" aria-label="GitHub" title="GitHub">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
          </svg>
        </a>

            <path
              d="M20.317 4.37a19.79 19.79 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.865-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.058a.082.082 0 00.031.056 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128c.126-.094.252-.192.372-.291a.074.074 0 01.078-.01c3.928 1.793 8.18 1.793 12.061 0a.074.074 0 01.079.009c.12.099.246.198.373.292a.077.077 0 01-.006.128 12.3 12.3 0 01-1.873.891.077.077 0 00-.041.107c.36.698.772 1.363 1.225 1.993a.076.076 0 00.084.029 19.84 19.84 0 006.002-3.03.077.077 0 00.032-.055c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 00-.031-.029zM8.02 15.33c-1.182 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.211 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" />

      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle color theme">
        <span id="theme-icon">☀</span><span id="theme-label">light mode</span>
      </button>
    </aside>

    <main class="main">
      {{ content }}
    </main>
  </div>

  <script>
    /* ---------- theme toggle ---------- */
    (function () {
      var root = document.documentElement;
      var btn = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      var label = document.getElementById('theme-label');
      function paint() {
        var dark = root.dataset.theme !== 'light';
        icon.textContent = dark ? '☀' : '☾';
        label.textContent = dark ? 'light mode' : 'dark mode';
      }
      btn.addEventListener('click', function () {
        root.dataset.theme = root.dataset.theme === 'light' ? 'dark' : 'light';
        localStorage.setItem('cybernook-theme', root.dataset.theme);
        paint();
      });
      paint();
    })();

    /* ---------- listing: combined search + tag filter + pagination ---------- */
    document.querySelectorAll('.listing').forEach(function (listing) {
      var input = listing.querySelector('.search-input');
      var chips = Array.prototype.slice.call(listing.querySelectorAll('.chip'));
      var items = Array.prototype.slice.call(listing.querySelectorAll('.item'));
      var pag = listing.querySelector('.pagination');
      var empty = listing.querySelector('.no-results');
      var pageSize = parseInt(listing.dataset.pageSize || '5', 10);
      var page = 1;
      var activeTags = [];

      function itemTags(item) {
        return item.dataset.tags ? item.dataset.tags.split('|') : [];
      }

      function matches(item) {
        var tags = itemTags(item);
        for (var i = 0; i < activeTags.length; i++) {
          if (tags.indexOf(activeTags[i]) === -1) return false;
        }
        var q = (input.value || '').trim().toLowerCase();
        if (!q) return true;
        var title = item.dataset.title || '';
        return q.split(/\s+/).every(function (tok) {
          return title.indexOf(tok) !== -1 ||
            tags.some(function (t) { return t.indexOf(tok) !== -1; });
        });
      }

      function render() {
        var visible = items.filter(matches);
        var pages = Math.max(1, Math.ceil(visible.length / pageSize));
        if (page > pages) page = pages;
        if (page < 1) page = 1;

        items.forEach(function (it) { it.hidden = true; });
        visible.slice((page - 1) * pageSize, page * pageSize)
          .forEach(function (it) { it.hidden = false; });
        empty.hidden = visible.length > 0;

        pag.innerHTML = '';
        if (visible.length === 0) return;
        if (page > 1) addNav('← Newer', -1);
        var span = document.createElement('span');
        span.textContent = 'Page ' + page + ' of ' + pages;
        pag.appendChild(span);
        if (page < pages) addNav('Older →', 1);

        function addNav(text, dir) {
          var a = document.createElement('a');
          a.textContent = text;
          a.addEventListener('click', function () {
            page += dir;
            render();
            listing.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
          pag.appendChild(a);
        }
      }

      chips.forEach(function (chip) {
        chip.addEventListener('click', function () {
          var tag = chip.dataset.tag;
          var idx = activeTags.indexOf(tag);
          if (idx === -1) { activeTags.push(tag); chip.classList.add('active'); }
          else { activeTags.splice(idx, 1); chip.classList.remove('active'); }
          page = 1;
          render();
        });
      });
      input.addEventListener('input', function () { page = 1; render(); });
      render();
    });
  </script>
</body>
